name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet[all]

      - name: Build APK
        run: |
          # سنستخدم أمر البناء المباشر مع تحديد ملف المدخل
          # تأكد أن ملفك اسمه main.py وموجود في المجلد الرئيسي للمستودع
          flet build apk --main main.py --verbose

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Asala-App-V1
          path: build/apk/*.apk
