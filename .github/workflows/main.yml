name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet[all]

      - name: Initialize and Build
        run: |
          # مسح أي إعدادات قديمة وإنشاء ملف تعريف جديد للمشروع
          rm -rf .flet
          flet create . --description "Al-Asala Engineering System"
          
          # البناء بدون الأوسمة التي تسبب تضارباً
          flet build apk --verbose

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Asala-App-V1
          path: build/apk/*.apk
