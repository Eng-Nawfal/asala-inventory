name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install flet[all]
          # إنشاء ملف requirements إذا لم يكن موجوداً لتجنب الخطأ
          if [ ! -f requirements.txt ]; then echo "flet" > requirements.txt; fi
          pip install -r requirements.txt

      - name: Initialize Flet App
        run: |
          # هذه الخطوة تنشئ ملفات التعريف الضرورية للأندرويد تلقائياً
          flet create . --description "Al-Asala Engineering Office Management System"

      - name: Build APK
        run: |
          # استخدام --verbose لإظهار التفاصيل الدقيقة في حال الفشل
          # استخدام --no-version-check لتفادي توقف البناء بسبب تحديثات المكتبة
          flet build apk --verbose --no-version-check

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Asala-App-Official
          path: build/apk/*.apk
